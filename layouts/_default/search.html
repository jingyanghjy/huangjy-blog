{{ define "main" }}
  <header class="mt-5">
    {{ if .Params.showBreadcrumbs | default (site.Params.list.showBreadcrumbs | default true) }}
      {{ partial "breadcrumbs.html" . }}
    {{ end }}

    <h1 class="mt-5 text-4xl font-extrabold text-neutral-900 dark:text-neutral">
      {{ .Title }}
    </h1>
  </header>

  <section
    class="mt-8"
    data-search-page
    data-url="{{ "" | relLangURL }}"
  >
    <form
      class="flex items-center gap-3 rounded-md border border-neutral-300 bg-neutral px-4 py-3 dark:border-neutral-700 dark:bg-neutral-800"
      data-search-page-form
    >
      <label class="sr-only" for="hj-search-page-query">搜索关键词</label>
      <input
        id="hj-search-page-query"
        name="q"
        type="search"
        class="min-w-0 flex-1 bg-transparent text-lg outline-none"
        placeholder="输入关键词搜索文章"
        autocomplete="off"
        data-search-page-input
      >
      <button
        type="submit"
        class="rounded-md bg-primary-600 px-4 py-2 text-sm font-semibold text-white hover:bg-primary-700"
      >
        搜索
      </button>
    </form>

    <label class="mt-3 flex items-center gap-2 text-sm text-neutral-600 dark:text-neutral-300">
      <input
        type="checkbox"
        class="h-4 w-4 rounded border-neutral-300 text-primary-600 focus:ring-primary-500"
        data-search-title-only
      >
      只匹配标题
    </label>

    <div class="mt-4 text-sm text-neutral-500 dark:text-neutral-400" data-search-page-status>
      请输入关键词后搜索。
    </div>

    <div class="mt-6 space-y-3" data-search-page-results></div>
  </section>

  {{ with resources.Get "js/search-page.js" }}
    {{ $script := . | minify | fingerprint }}
    <script defer src="{{ $script.RelPermalink }}"></script>
  {{ end }}
{{ end }}
